<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-dragdata@2.2.5/dist/chartjs-plugin-dragdata.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131013;
            color: #f3f4f6;
        }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
                Traffic Signal Editor
            </h1>
            <p class="mt-2 text-lg text-gray-400">
                Define a traffic signal using editable control points.
                <strong class="text-indigo-400">Drag points</strong> to move them.
                <strong class="text-green-400">Double-click the chart</strong> to add a point.
                <strong class="text-red-400">Double-click a point</strong> to delete it.
            </p>
        </header>

        <div class="mb-6 p-6 bg-gray-800 rounded-lg shadow-md">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Y-Axis Controls -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Packet Count (Min, Max)</label>
                    <div class="flex space-x-2">
                        <input id="yMin" type="number" value="0" class="block w-full rounded-md border-gray-600 bg-gray-700 py-2 px-3 text-white focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Min">
                        <input id="yMax" type="number" value="100" class="block w-full rounded-md border-gray-600 bg-gray-700 py-2 px-3 text-white focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Max">
                    </div>
                </div>
                <!-- X-Axis Controls -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Duration</label>
                    <div class="flex space-x-2">
                        <input id="xDuration" type="number" value="1" min="1" class="block w-full rounded-md border-gray-600 bg-gray-700 py-2 px-3 text-white focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Min">
                        <select id="xUOM" class="block w-full rounded-md border-gray-600 bg-gray-700 py-2 pl-3 pr-10 text-white focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                            <option value="s">Seconds</option>
                            <option value="m">Minutes</option>
                            <option value="H">Hours</option>
                        </select>
                    </div>
                </div>

                <!-- Actions -->
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">CSV Sampling Interval</label>
                        <div class="flex space-x-2">
                            <input id="interval" type="number" value="1" min="1" class="block w-full rounded-md border-gray-600 bg-gray-700 py-2 px-3 text-white focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Min">
                            <select id="intervalUOM" class="block w-full rounded-md border-gray-600 bg-gray-700 py-2 pl-3 pr-10 text-white focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                                <option value="s">Seconds</option>
                                <option value="m">Minutes</option>
                                <option value="H">Hours</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Actions</label>
                        <div class="flex space-x-2">
                            <button id="btnReset" type="button" class="w-full rounded-md bg-gray-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-500">
                                Reset Points
                            </button>
                            <button id="btnExport" type="button" class="w-full rounded-md bg-green-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-500">
                                Export to CSV
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="h-[600px] w-full p-6 bg-gray-800 rounded-lg shadow-md">
            <canvas id="trafficChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let chartInstance = null;
            const canvas = document.getElementById('trafficChart');
            const ctx = canvas.getContext('2d');

            // Input elements
            const inMinPacketCount = document.getElementById('yMin');
            const inMaxPacketCount = document.getElementById('yMax');
            const inDuration = document.getElementById('xDuration');
            const inDurationUOM = document.getElementById('xUOM');
            const inInterval = document.getElementById('interval');
            const inIntervalUOM = document.getElementById('intervalUOM');
            const btnReset = document.getElementById('btnReset');
            const btnExport = document.getElementById('btnExport');

            // Placeholder data points: {x: seconds, y: packet count}

            let controlPoints = [];
            resetControlPoints();

            function resetControlPoints() {
                controlPoints = [
                    { x: 0, y: 0 },
                    {
                        x: timeToSeconds(parseInt(inDuration.value) || 1, inDurationUOM.value) * 0.5,
                        y:  (parseInt(inMaxPacketCount.value) || 1) * 0.9
                    },
                    {
                        x: timeToSeconds(parseInt(inDuration.value) || 1, inDurationUOM.value),
                        y: 0
                    }
                ];
            }

            /**
             * Convert a time value with its unit of measurement to seconds
             */
            function timeToSeconds(time, uom) {
                let seconds = time;
                switch(uom) {
                    case "H":
                        seconds *= 60;
                        /* Fallthrough */
                    case "m":
                        seconds *= 60;
                        /* Fallthrough */
                    case "s":
                        break;
                    default:
                        seconds = 1;
                        break;
                }
                return seconds;
            }

            /**
             * Convert the given number of seconds to the specified unit of measurement
             */
            function secondsToTime(seconds, uom) {
                let time = seconds;
                switch(uom) {
                    case "H":
                        time /= 60;
                        /* Fallthrough */
                    case "m":
                        time /= 60;
                        /* Fallthrough */
                    case "s":
                        break;
                    default:
                        time = 1;
                        break;
                }
                return time;
            }

            /**
             * Sorts control points by their x-value (time)
             */
            function sortData() {
                controlPoints.sort((a, b) => a.x - b.x);
            }


            /**
             * Updates the X-axis range on the chart
             */
            function updateXAxis() {
                if (!chartInstance) return;
                const duration = parseInt(inDuration.value) || 1;
                const uom = inDurationUOM.value;
                const seconds = timeToSeconds(duration, uom);

                const oldDuration = chartInstance.options.scales.x.max;
                const durationRatio = seconds / oldDuration;
                controlPoints.forEach(element => {
                    element.x *= durationRatio;
                });

                chartInstance.options.scales.x.max = seconds;
                chartInstance.options.scales.x.ticks.stepSize = timeToSeconds(duration, uom) * 0.1
                chartInstance.update('none');
            }

            /**
             * Updates the Y-axis range on the chart
             */
            function updateYAxis() {
                if (!chartInstance) return;
                const min = parseInt(inMinPacketCount.value) || 0;
                const max = parseInt(inMaxPacketCount.value) || 100;

                const oldMin = chartInstance.options.scales.y.min;
                const oldMax = chartInstance.options.scales.y.max;
                const ratio = (max - min) / (oldMax - oldMin);
                controlPoints.forEach(element => {
                    element.y -= oldMin;
                    element.y *= ratio;
                    element.y += min;
                });

                chartInstance.options.scales.y.min = min;
                chartInstance.options.scales.y.max = max;
                chartInstance.update('none');
            }

            /**
             * Initializes or re-initializes the Chart.js instance.
             */
            function setupChart() {
                sortData();

                if (chartInstance) {
                    chartInstance.destroy();
                }

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Traffic Distribution',
                            data: controlPoints,
                            borderColor: 'rgb(121, 46, 176)',
                            backgroundColor: 'rgba(75, 0, 130, 0.2)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 6,
                            pointHitRadius: 15,
                            pointHoverRadius: 8,
                            pointBackgroundColor: 'rgb(151, 76, 206)',
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                title: {
                                    display: true,
                                    text: 'Packet Count',
                                    color: '#d1d5db'
                                },
                                grid: { color: '#374151' },
                                ticks: { color: '#d1d5db' },
                                min: parseFloat(inMinPacketCount.value) || 0,
                                max: parseFloat(inMaxPacketCount.value) || 100,
                            },
                            x: {
                                type: 'linear',
                                title: {
                                    display: true,
                                    text: 'Time',
                                    color: '#d1d5db'
                                },
                                grid: { color: '#374151' },
                                ticks: {
                                    color: '#d1d5db',
                                    stepSize: timeToSeconds(parseInt(inDuration.value) || 1, inDurationUOM.value) * 0.1,
                                    callback: function(value) {
                                        const uom = inDurationUOM.value;
                                        const time = secondsToTime(value.toString(), uom);
                                        return `${time} ${uom}`;
                                    }
                                },
                                min: 0,
                                max: parseInt(inDuration.value)
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                enabled: true,
                                callbacks: {
                                    title: function(tooltipItems) {
                                        const uom = inDurationUOM.value;
                                        const time = secondsToTime(tooltipItems[0].parsed.x, uom);
                                        return `Time: ${time.toString()} ${uom}`;
                                    },
                                    label: function(tooltipItem) {
                                        return `Value: ${tooltipItem.parsed.y.toFixed(2)}`;
                                    }
                                }
                            },
                            dragData: {
                                enabled: true,
                                onDragEnd: (e, datasetIndex, index, value) => {
                                    controlPoints[index] = value;
                                    sortData();
                                    chartInstance.update('none');
                                }
                            }
                        }
                    }
                });
            }

            /**
             * Handles double-clicks on the chart canvas.
             * Adds a point on the background, removes a point on a point.
             */
            function onChartDoubleClick(e) {
                if (!chartInstance) return;

                const points = chartInstance.getElementsAtEventForMode(e, 'point', { intersect: true }, true);

                if (points.length > 0) {
                    // Remove point
                    const pointIndex = points[0].index;
                    // Don't allow deleting the first or last point
                    if (pointIndex > 0 && pointIndex < controlPoints.length - 1) {
                        controlPoints.splice(pointIndex, 1);
                        chartInstance.update('none');
                    }
                } else {
                    // Add point
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const xValue = chartInstance.scales.x.getValueForPixel(x);
                    const yValue = chartInstance.scales.y.getValueForPixel(y);

                    const duration = timeToSeconds(parseInt(inDuration.value), inDurationUOM.value);
                    const newX = Math.max(0, Math.min(duration, xValue));
                    const newY = Math.max(parseFloat(inMinPacketCount.value) || 0, Math.min(parseFloat(inMaxPacketCount.value) || 100, yValue));

                    controlPoints.push({ x: newX, y: newY.toFixed(2) });
                    sortData();
                    chartInstance.update('none');
                }
            }

            /**
             * Catmull-Rom spline interpolation.
             * This function precisely calculates the value at any point along
             * the same curve that Chart.js draws.
             *
             * @param {number} t - The point in time (x-value) to interpolate.
             * @param {Array} points - The array of {x, y} control points.
             * @returns {number} The interpolated y-value.
             */
            function getSplineValue(t, points) {
                if (points.length < 2) return 0;

                // Find the segment t falls into
                let p1_idx = points.findIndex(p => p.x >= t);

                if (p1_idx === -1) { // t is after the last point
                    return points[points.length - 1].y;
                }
                if (p1_idx === 0) { // t is before the first point
                    return points[0].y;
                }

                // We need 4 points for Catmull-Rom: p0, p1, p2, p3
                // The curve is drawn between p1 and p2
                const p0_idx = Math.max(0, p1_idx - 2);
                const p2_idx = p1_idx;
                const p1_idx_adj = p1_idx - 1; // Correct index for p1
                const p3_idx = Math.min(points.length - 1, p1_idx + 1);

                const p0 = points[p0_idx];
                const p1 = points[p1_idx_adj];
                const p2 = points[p2_idx];
                const p3 = points[p3_idx];

                // Normalize t to be [0, 1] within the p1-p2 segment
                let nt = (t - p1.x) / (p2.x - p1.x);
                if (isNaN(nt) || !isFinite(nt)) {
                    nt = 0; // Handle division by zero if p1.x == p2.x
                }

                const t2 = nt * nt;
                const t3 = t2 * nt;

                // Catmull-Rom spline formula (alpha=0.5)
                const a = 0.5 * (2 * p1.y);
                const b = 0.5 * (p2.y - p0.y);
                const c = 0.5 * (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y);
                const d = 0.5 * (-p0.y + 3 * p1.y - 3 * p2.y + p3.y);

                return a + (b * nt) + (c * t2) + (d * t3);
            }


            /**
             * Exports the interpolated signal to a CSV file.
             */
            function exportToCSV() {
                const interval = timeToSeconds(parseInt(inInterval.value) || 1, inIntervalUOM.value);
                let csvContent = "data:text/csv;charset=utf-f,";
                csvContent += "UnixTimestamp,NormalizedPacketCount\n";

                const sampledData = [];
                let totalValue = 0;

                // 1. Sample the spline curve at the specified interval
                const duration = timeToSeconds(parseInt(inDuration.value), inDurationUOM.value) || 1;
                for (let ts = 0; ts <= duration; ts += interval) {
                    let value = getSplineValue(ts, controlPoints);
                    const yMin = parseFloat(inMinPacketCount.value) || 0;
                    const yMax = parseFloat(inMaxPacketCount.value) || 100;
                    value = Math.max(yMin, Math.min(yMax, value));
                    value = Math.max(0, value);
                    sampledData.push({ timestamp: ts, value: value });
                    totalValue += value;
                }

                // 2. Normalize the sampled data
                if (totalValue === 0) {
                    console.warn("Total packet count is zero. Export will contain all zeros.");
                }

                for (const data of sampledData) {
                    const normalizedValue = (totalValue === 0) ? 0 : (data.value / totalValue);
                    csvContent += `${data.timestamp},${normalizedValue}\n`;
                }

                // 3. Create and download the file
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "traffic_signal.csv");
                document.body.appendChild(link); // Required for Firefox
                link.click();
                document.body.removeChild(link);
            }

            // --- Event Listeners Setup ---
            inDuration.addEventListener('change', updateXAxis);
            inDurationUOM.addEventListener('change', updateXAxis);
            inMinPacketCount.addEventListener('change', updateYAxis);
            inMaxPacketCount.addEventListener('change', updateYAxis);
            btnReset.addEventListener('click', () => {
                resetControlPoints();
                chartInstance.data.datasets[0].data = controlPoints;
                chartInstance.update('none');
            });
            btnExport.addEventListener('click', exportToCSV);
            canvas.addEventListener('dblclick', onChartDoubleClick);


            // Initial setup
            setupChart();
        });
    </script>
</body>
</html>
